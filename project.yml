name: KDWarm
options:
  bundleIdPrefix: com.kdwarm
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  # Sparkle auto-update framework (EdDSA-signed appcast). Private key stays offline / in CI;
  # the public key is set as SUPublicEDKey in Info.plist.
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

settings:
  base:
    ARCHS: "arm64 x86_64"
    ONLY_ACTIVE_ARCH: "YES"
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    MARKETING_VERSION: "0.3.0"
    CURRENT_PROJECT_VERSION: "4"
    # Local builds sign ad-hoc; real Developer ID + notarization arrives in Phase 9.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "YES"
    DEVELOPMENT_TEAM: ""

schemes:
  # Test scheme so `xcodebuild test` can drive the framework's logic tests without an app host.
  KDWarmKit-Tests:
    build:
      targets:
        KDWarmKit: all
        KDWarmKitTests: [test]
    test:
      targets:
        - KDWarmKitTests

targets:
  # Shared framework: design tokens + models + the XPC contract, linked by the app
  # (and, from Phase 4, the privileged helper) so model types stay single-sourced.
  KDWarmKit:
    type: framework
    platform: macOS
    sources:
      - path: KDWarmKit/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kdwarm.kit
        DEFINES_MODULE: "YES"
        SKIP_INSTALL: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        ENABLE_HARDENED_RUNTIME: "YES"

  # Menu-bar accessory app (no Dock icon at idle). UI only — logic lives in KDWarmKit.
  KDWarm:
    type: application
    platform: macOS
    sources:
      - path: KDWarm
        excludes:
          - "Resources/bin/**"
      # Folder reference so the vendored binaries keep their `bin/` subdirectory in the
      # bundle (Contents/Resources/bin/), which is where BinaryStager reads them from.
      # The contents are build artifacts produced by scripts/build-*.sh (gitignored).
      - path: KDWarm/Resources/bin
        type: folder
        buildPhase: resources
    dependencies:
      - target: KDWarmKit
        embed: true
      - package: Sparkle
      # Build-order + copy only (no linking); lands in Contents/MacOS so Phase 4's
      # SMAppService daemon plist can reference it. Empty stub for now.
      - target: KDWarmHelper
        link: false
        copy:
          destination: executables
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kdwarm.app
        # Display/product name is KTStack (the app is KTStack.app); the Xcode TARGET + bundle id stay
        # "KDWarm"/com.kdwarm.* internally so existing installs, data dir, and launchd jobs keep working.
        PRODUCT_NAME: KTStack
        INFOPLIST_FILE: KDWarm/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: entitlements/app.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: "YES"
        COMBINE_HIDPI_IMAGES: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"

  # Privileged helper (root). XPC DNS surface. SMAppService daemon layout in place; live
  # registration gated on Developer ID signing (Phase 9). Compiles the SHARED XPC + DNS files
  # directly (separate process from the app → no @objc-protocol clash) so identity/requirement
  # constants are single-sourced and can't drift.
  KDWarmHelper:
    type: tool
    platform: macOS
    sources:
      - path: KDWarmHelper
        excludes:
          - "com.kdwarm.helper.plist"   # embedded in the app bundle, not compiled into the tool
      - path: KDWarmKit/Sources/XPC/HelperXPCProtocol.swift
      - path: KDWarmKit/Sources/XPC/HelperIdentityConstants.swift
      - path: KDWarmKit/Sources/DNS/DNSConstants.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kdwarm.helper
        CODE_SIGN_ENTITLEMENTS: entitlements/helper.entitlements
        ENABLE_HARDENED_RUNTIME: "YES"

  # Logic tests for the framework (config writers, paths, pool/preflight). Runs without an
  # app host — pure XCTest against KDWarmKit.
  KDWarmKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: KDWarmKitTests
    dependencies:
      - target: KDWarmKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kdwarm.kit.tests
        GENERATE_INFOPLIST_FILE: "YES"
