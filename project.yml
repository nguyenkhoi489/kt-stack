name: KTStack
options:
  bundleIdPrefix: com.ktstack
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  # Sparkle auto-update framework (EdDSA-signed appcast). Private key stays offline / in CI;
  # the public key is set as SUPublicEDKey in Info.plist.
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  # Pure-Swift MySQL driver (NIO). No system libmysqlclient / C dylib → links statically into
  # the framework, so the bundle stays notarize-clean. TLS rides swift-nio-ssl's vendored
  # BoringSSL (also static), not the system OpenSSL. Pinned via `from:`; the generated
  # Package.resolved is ephemeral like the rest of the XcodeGen-built project.
  mysql-nio:
    url: https://github.com/vapor/mysql-nio
    from: "1.9.0"
  # Pure-Swift PostgreSQL driver (NIO). Like mysql-nio it links statically (no libpq C dylib) and
  # rides swift-nio-ssl's vendored BoringSSL for TLS, so the bundle stays notarize-clean.
  postgres-nio:
    url: https://github.com/vapor/postgres-nio
    from: "1.21.0"
  # SQLite toolkit. GRDB vendors its own SQLite (no system libsqlite3 link surprise) and exposes a
  # synchronous DatabaseQueue we wrap behind the async RelationalDriver. Pure-Swift + C SQLite that
  # GRDB compiles in-tree — links statically, no external dylib.
  GRDB.swift:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  # Pure-Swift MongoDB driver (NIO). No libmongoc / system dylib (unlike mongo-swift-driver) → links
  # statically into the framework, keeping the bundle notarize-clean. BSON arrives transitively and
  # supplies the extended-JSON codec the document UI renders with.
  MongoKitten:
    url: https://github.com/orlandos-nl/MongoKitten
    from: "7.0.0"

settings:
  base:
    ARCHS: "arm64 x86_64"
    ONLY_ACTIVE_ARCH: "YES"
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    MARKETING_VERSION: "0.1.8"
    CURRENT_PROJECT_VERSION: "11"
    # Local builds sign ad-hoc; real Developer ID + notarization arrives in Phase 9.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "YES"
    DEVELOPMENT_TEAM: ""

schemes:
  # Test scheme so `xcodebuild test` can drive the framework's logic tests without an app host.
  KTStackKit-Tests:
    build:
      targets:
        KTStackKit: all
        KTStackKitTests: [test]
    test:
      targets:
        - KTStackKitTests

targets:
  # Shared framework: design tokens + models + the XPC contract, linked by the app
  # (and, from Phase 4, the privileged helper) so model types stay single-sourced.
  KTStackKit:
    type: framework
    platform: macOS
    sources:
      - path: KTStackKit/Sources
    dependencies:
      - package: mysql-nio
        product: MySQLNIO
      - package: postgres-nio
        product: PostgresNIO
      - package: GRDB.swift
        product: GRDB
      - package: MongoKitten
        product: MongoKitten
      - package: MongoKitten
        product: MongoCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ktstack.kit
        DEFINES_MODULE: "YES"
        SKIP_INSTALL: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        ENABLE_HARDENED_RUNTIME: "YES"

  # Menu-bar accessory app (no Dock icon at idle). UI only — logic lives in KTStackKit.
  KTStack:
    type: application
    platform: macOS
    sources:
      - path: KTStack
        excludes:
          - "Resources/bin/**"
          - "Resources/fonts/**"
      # Folder reference so the vendored binaries keep their `bin/` subdirectory in the
      # bundle (Contents/Resources/bin/), which is where BinaryStager reads them from.
      # The contents are build artifacts produced by scripts/build-*.sh (gitignored).
      - path: KTStack/Resources/bin
        type: folder
        buildPhase: resources
      # Bundled JetBrains Mono faces, kept in a fonts/ subdirectory so Info.plist's
      # ATSApplicationFontsPath can auto-activate them at launch.
      - path: KTStack/Resources/fonts
        type: folder
        buildPhase: resources
    dependencies:
      - target: KTStackKit
        embed: true
      - package: Sparkle
      # Build-order + copy only (no linking); lands in Contents/MacOS so Phase 4's
      # SMAppService daemon plist can reference it. Empty stub for now.
      - target: KTStackHelper
        link: false
        copy:
          destination: executables
      # Tiny CLI the shell shims exec to resolve per-project runtime versions. Shares the
      # resolver core source with KTStackKit so terminal and web pick the same PHP version.
      - target: ktstack-resolve
        link: false
        copy:
          destination: executables
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ktstack.app
        # Legacy com.kdwarm.* installs (data dir, launchd jobs, keychain, defaults) are carried over
        # once at first launch by LegacyKDWarmMigration.
        PRODUCT_NAME: KTStack
        INFOPLIST_FILE: KTStack/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: entitlements/app.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: "YES"
        COMBINE_HIDPI_IMAGES: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"

  # Privileged helper (root). XPC DNS surface. SMAppService daemon layout in place; live
  # registration gated on Developer ID signing (Phase 9). Compiles the SHARED XPC + DNS files
  # directly (separate process from the app → no @objc-protocol clash) so identity/requirement
  # constants are single-sourced and can't drift.
  KTStackHelper:
    type: tool
    platform: macOS
    sources:
      - path: KTStackHelper
        excludes:
          - "com.ktstack.helper.plist"   # embedded in the app bundle, not compiled into the tool
      - path: KTStackKit/Sources/XPC/HelperXPCProtocol.swift
      - path: KTStackKit/Sources/XPC/HelperIdentityConstants.swift
      - path: KTStackKit/Sources/DNS/DNSConstants.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ktstack.helper
        CODE_SIGN_ENTITLEMENTS: entitlements/helper.entitlements
        ENABLE_HARDENED_RUNTIME: "YES"

  # Shell-shim resolver CLI. Compiles the resolver core files from KTStackKit directly (same
  # pattern as KTStackHelper) so the per-project version logic is single-sourced between the
  # terminal shims and the app's php-fpm pool selection.
  ktstack-resolve:
    type: tool
    platform: macOS
    sources:
      - path: KTStackResolve
      - path: KTStackKit/Sources/Process/AppSupportPaths.swift
      - path: KTStackKit/Sources/Runtimes/VersionResolver.swift
      - path: KTStackKit/Sources/Runtimes/RuntimeCatalog.swift
      - path: KTStackKit/Sources/Shell/ProjectVersionResolver.swift
      - path: KTStackKit/Sources/Shell/ShellRuntimeBinResolver.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ktstack.resolve
        CODE_SIGN_ENTITLEMENTS: entitlements/helper.entitlements
        ENABLE_HARDENED_RUNTIME: "YES"

  # Logic tests for the framework (config writers, paths, pool/preflight). Runs without an
  # app host — pure XCTest against KTStackKit.
  KTStackKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: KTStackKitTests
    dependencies:
      - target: KTStackKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ktstack.kit.tests
        GENERATE_INFOPLIST_FILE: "YES"
